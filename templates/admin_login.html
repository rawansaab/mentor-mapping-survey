{% extends "layout.html" %}
{% block title %}כניסה למרצים{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<a href="{{ url_for('index') }}" class="back-btn">חזרה לשאלון</a>

<div class="admin-wrapper narrow">
  <div class="admin-header">
    <h1>פאנל מרצים</h1>
    <p>כניסה לניהול טופס הסטודנטים וטופס מיפוי המדריכים.</p>
  </div>

  <form method="post" class="login-card">
    <h2>כניסה למערכת</h2>

    <label>
      <span>סיסמת מנהל</span>
      <input type="password" name="password" required>
    </label>

    <label>
      <span>קוד סודי</span>
      <input type="password" name="secret_code" required>
    </label>

    <button type="submit" class="login-btn">כניסה למערכת</button>
  </form>
</div>
{% endblock %}
