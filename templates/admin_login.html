<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>כניסת מרצים</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container" style="max-width: 400px; margin-top: 10vh;">
  <form method="post" class="card">
    <h2 style="text-align: center;">🔒 כניסת צוות מרצים</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="msg msg-error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <label>
      <span class="label-text">סיסמת ניהול</span>
      <input type="password" name="password" required autofocus>
    </label>
    <div class="submit-wrap"><button type="submit">היכנס לפאנל</button></div>
  </form>
</div>
</body>
</html>
