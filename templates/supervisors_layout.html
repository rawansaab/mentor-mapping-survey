<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}מערכת מדריכים{% endblock %}</title>
  <style>
    :root {
      --bg-1: #f4fbfb; --bg-2: #f7f3fb; --bg-3: #fff9ed; --bg-4: #fdf1f4; --bg-5: #f5faf5;
      --ink: #0f172a; --primary: #10b981; --primary-700: #047857; /* ירוק שונה מסטודנטים כדי להבדיל */
      --card: #ffffff; --field-border: #d0d7e3;
      --grad-main: linear-gradient(90deg, #10b981 0%, #3b82f6 100%);
    }

    html, body, button, input, select, textarea {
      direction: rtl; text-align: right; margin: 0;
      font-family: "David", "Assistant", sans-serif; color: var(--ink);
    }

    body {
      font-size: 25px;
      background: radial-gradient(1200px 600px at 15% 10%, var(--bg-2) 0%, transparent 70%),
                  radial-gradient(1000px 500px at 85% 15%, var(--bg-4) 0%, transparent 65%), var(--bg-1);
    }
    * { box-sizing: border-box; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    
    .hero { text-align: center; padding: 20px 0; }
    .hero h1 { font-size: 42px; font-weight: 900; margin: 0; color: #111827;}
    .hero .sub { color: #6b7280; font-size: 18px; margin-top: 10px; }

    .card { background: var(--card); border: 1px solid #e9edf3; border-radius: 16px; padding: 30px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    
    section { margin-bottom: 35px; padding-bottom: 20px; border-bottom: 2px dashed #f3f4f6; }
    section:last-child { border-bottom: none; margin-bottom: 0; }
    h2 { font-size: 30px; font-weight: 800; color: #1f2937; margin-top: 0; margin-bottom: 20px; }

    label { display: flex; flex-direction: column; gap: 5px; font-size: 18px; margin-bottom: 15px; font-weight: bold;}
    label.required span::after { content: " *"; color: #ef4444; }

    input, select, textarea {
      width: 100%; padding: 14px; border: 2px solid var(--field-border); border-radius: 12px; font-size: 18px;
      font-family: "David", sans-serif; transition: 0.3s; background: #f9fafb;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(16,185,129,0.1); }

    .radio-group { display: flex; gap: 30px; margin-top: 5px; }
    .radio-option { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: normal; }
    .radio-option input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }

    .btn { background: var(--grad-main); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; font-family: "David", sans-serif; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(16,185,129,0.3); }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(16,185,129,0.4); }

    .messages { margin-bottom: 20px; }
    .msg { padding: 15px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
    .msg-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .admin-mini-btn { position: fixed; top: 16px; left: 16px; z-index: 9999; display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 16px; background: rgba(255,255,255,.8); border: 1px solid #e5e7eb; color: #111827; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,.05); }
    .admin-mini-btn:hover { background: #fff; transform: translateY(-2px); }

    /* Custom Checkbox Grid for Options */
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .check-item { display: flex; align-items: center; gap: 10px; font-weight: normal; cursor: pointer; background: #f3f4f6; padding: 10px; border-radius: 8px; border: 1px solid #e5e7eb;}
    .check-item:hover { background: #e0f2fe; border-color: #7dd3fc; }
    .check-item input { width: 20px; height: 20px; margin: 0; }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="container messages">
        {% for cat, msg in messages %}
          <div class="msg msg-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</body>
</html>
